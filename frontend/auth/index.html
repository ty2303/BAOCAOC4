<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
</head>
<body class="auth-page">

<div class="auth-logo">
    <a href="/home/">ShopVN</a>
    <p>Mua sắm thông minh</p>
</div>

<div class="auth-card">
    <div class="tab-switcher">
        <button class="active" id="btn-tab-login" onclick="switchTab('login')">Đăng nhập</button>
        <button id="btn-tab-register" onclick="switchTab('register')">Đăng ký</button>
    </div>

    <div class="alert-box" id="alert-box"></div>

    <div class="tab-panel active" id="panel-login">
        <form id="form-login" novalidate>
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="login-username" class="form-control" placeholder="Nhập username" autocomplete="username">
            </div>

            <div class="mb-2">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text" id="toggle-login-pw">👁</span>
                    <input type="password" id="login-password" class="form-control" placeholder="Nhập mật khẩu" autocomplete="current-password">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <label class="d-flex align-items-center gap-2 mb-0" style="font-size:.85rem; cursor:pointer;">
                    <input type="checkbox" id="remember-me"> Ghi nhớ đăng nhập
                </label>
                <a href="#" style="font-size:.85rem;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-submit" id="btn-login">
                Đăng nhập
            </button>
        </form>

        <div class="divider">hoặc</div>
        <p class="text-center mb-0" style="font-size:.88rem;">
            Chưa có tài khoản?
            <a href="#" onclick="switchTab('register'); return false;" class="fw-semibold">Đăng ký ngay</a>
        </p>
    </div>

    <div class="tab-panel" id="panel-register">
        <form id="form-register" novalidate>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                    <input type="text" id="reg-username" class="form-control" placeholder="username" autocomplete="username">
                </div>
                <div class="col-6">
                    <label class="form-label">Họ tên</label>
                    <input type="text" id="reg-fullname" class="form-control" placeholder="Nguyen Van A">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" id="reg-email" class="form-control" placeholder="example@email.com" autocomplete="email">
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text" id="toggle-reg-pw">👁</span>
                    <input type="password" id="reg-password" class="form-control" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
                </div>
                <div class="pw-bar-wrap"><div class="pw-bar" id="pw-bar"></div></div>
                <div id="pw-hint" style="font-size:.76rem; margin-top:4px; color:#6c757d;"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Role ID <span class="text-danger">*</span>
                    <a href="/api/v1/roles" target="_blank" class="ms-1" style="font-size:.76rem;">(lấy từ API)</a>
                </label>
                <input type="text" id="reg-role" class="form-control" placeholder="Dán _id của role vào đây">
            </div>

            <button type="submit" class="btn btn-success btn-submit" id="btn-register">
                Tạo tài khoản
            </button>
        </form>

        <div class="divider">hoặc</div>
        <p class="text-center mb-0" style="font-size:.88rem;">
            Đã có tài khoản?
            <a href="#" onclick="switchTab('login'); return false;" class="fw-semibold">Đăng nhập</a>
        </p>
    </div>
</div>

<div class="back-home">
    <a href="/home/">← Quay về trang chủ</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';

if (localStorage.getItem('token')) {
    if (localStorage.getItem('role') === 'ADMIN') {
        window.location.replace('/admin/');
    } else {
        window.location.replace('/home/');
    }
}

function switchTab(tab) {
    hideAlert();
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('btn-tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('btn-tab-register').classList.toggle('active', tab === 'register');
}

if (window.location.hash === '#register') {
    switchTab('register');
}

function bindToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', function () {
        let inp = document.getElementById(inputId);
        inp.type = inp.type === 'password' ? 'text' : 'password';
        this.textContent = inp.type === 'password' ? '👁' : '🙈';
    });
}
bindToggle('toggle-login-pw', 'login-password');
bindToggle('toggle-reg-pw', 'reg-password');

document.getElementById('reg-password').addEventListener('input', function () {
    let v = this.value;
    let bar = document.getElementById('pw-bar');
    let hint = document.getElementById('pw-hint');
    bar.className = 'pw-bar';
    if (!v) {
        hint.textContent = '';
        return;
    }
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    if (score <= 1) {
        bar.classList.add('weak');
        hint.textContent = 'Yeu';
        hint.style.color = '#dc3545';
    } else if (score <= 2) {
        bar.classList.add('medium');
        hint.textContent = 'Trung binh';
        hint.style.color = '#ffc107';
    } else {
        bar.classList.add('strong');
        hint.textContent = 'Manh';
        hint.style.color = '#198754';
    }
});

function showAlert(msg, type) {
    let el = document.getElementById('alert-box');
    el.textContent = msg;
    el.className = 'alert-box show ' + (type || 'error');
}

function hideAlert() {
    let el = document.getElementById('alert-box');
    el.className = 'alert-box';
}

function setLoading(id, on, label) {
    let btn = document.getElementById(id);
    btn.disabled = on;
    btn.innerHTML = on
        ? '<span class="spinner-border spinner-border-sm me-2"></span>Dang xu ly...'
        : label;
}

document.getElementById('form-login').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    let username = document.getElementById('login-username').value.trim();
    let password = document.getElementById('login-password').value;
    if (!username || !password) {
        showAlert('Vui long dien day du thong tin.');
        return;
    }

    setLoading('btn-login', true);
    try {
        let res = await fetch(BASE + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, rememberMe: document.getElementById('remember-me').checked })
        });
        let data = await res.json();
        if (!res.ok) {
            showAlert(data.message || 'Sai ten dang nhap hoac mat khau.');
            return;
        }

        let token = data.token || data.accessToken || '';
        localStorage.setItem('token', token);
        localStorage.setItem('username', username);

        let redirectUrl = '/home/';
        try {
            let meRes = await fetch(BASE + '/auth/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (meRes.ok) {
                let me = await meRes.json();
                localStorage.setItem('userId', me._id);
                localStorage.setItem('username', me.username);
                localStorage.setItem('role', me.role?.name || '');
                if (me.role?.name === 'ADMIN') {
                    redirectUrl = '/admin/';
                }
            }
        } catch {}

        window.location.replace(redirectUrl);
    } catch {
        showAlert('Loi ket noi server. Hay chac chan server dang chay.');
    } finally {
        setLoading('btn-login', false, 'Đăng nhập');
    }
});

document.getElementById('form-register').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    let username = document.getElementById('reg-username').value.trim();
    let email = document.getElementById('reg-email').value.trim();
    let fullName = document.getElementById('reg-fullname').value.trim();
    let password = document.getElementById('reg-password').value;
    let role = document.getElementById('reg-role').value.trim();

    if (!username || !email || !password || !role) {
        showAlert('Vui long dien day du cac truong bat buoc.');
        return;
    }
    if (password.length < 6) {
        showAlert('Mat khau phai co it nhat 6 ky tu.');
        return;
    }

    setLoading('btn-register', true);
    try {
        let res = await fetch(BASE + '/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, fullName, password, role })
        });
        let data = await res.json();
        if (!res.ok) {
            showAlert(data.message || 'Dang ky that bai.');
            return;
        }

        showAlert('Dang ky thanh cong. Chuyen sang dang nhap...', 'success');
        document.getElementById('form-register').reset();
        document.getElementById('pw-bar').className = 'pw-bar';
        document.getElementById('pw-hint').textContent = '';

        setTimeout(function () {
            switchTab('login');
            document.getElementById('login-username').value = username;
        }, 900);
    } catch {
        showAlert('Loi ket noi server. Hay chac chan server dang chay.');
    } finally {
        setLoading('btn-register', false, 'Tạo tài khoản');
    }
});
</script>
</body>
</html>
