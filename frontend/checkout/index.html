<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/layout/load-layout.js" defer></script>
</head>
<body>

<div data-include="/layout/header.html"></div>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Chọn địa chỉ giao hàng</h5>
                    <div id="address-area">
                        <div class="skeleton-box" style="height:120px;border-radius:14px;"></div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Nhập địa chỉ thủ công</h5>
                    <textarea id="manual-address" class="form-control" rows="4" placeholder="Ví dụ: 123 Nguyễn Trãi, Phường Thượng Đình, Quận Thanh Xuân, Hà Nội" style="border-radius:10px;"></textarea>
                    <div class="form-text">Nếu bạn nhập địa chỉ ở đây, hệ thống sẽ ưu tiên dùng địa chỉ này thay vì address đã lưu.</div>
                </div>
            </div>

            <div class="card border-0 shadow-sm" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Phương thức thanh toán</h5>
                    <div class="d-flex flex-column gap-2">
                        <label class="border rounded-3 p-3 d-flex gap-2 align-items-start">
                            <input class="form-check-input mt-1" type="radio" name="payment-method" value="cod" checked>
                            <span>
                                <div class="fw-semibold">Thanh toán khi nhận hàng (COD)</div>
                                <div class="text-muted" style="font-size:.9rem;">Phù hợp nhất với luồng hiện tại.</div>
                            </span>
                        </label>
                        <label class="border rounded-3 p-3 d-flex gap-2 align-items-start">
                            <input class="form-check-input mt-1" type="radio" name="payment-method" value="banking">
                            <span>
                                <div class="fw-semibold">Chuyển khoản</div>
                                <div class="text-muted" style="font-size:.9rem;">Hiện mới tạo transaction nội bộ.</div>
                            </span>
                        </label>
                        <label class="border rounded-3 p-3 d-flex gap-2 align-items-start">
                            <input class="form-check-input mt-1" type="radio" name="payment-method" value="momo">
                            <span>
                                <div class="fw-semibold">Ví MoMo</div>
                                <div class="text-muted" style="font-size:.9rem;">Chưa tích hợp cổng thanh toán thật.</div>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="summary-card">
                <h5>Xác nhận đơn hàng</h5>
                <div id="checkout-items" class="mb-3"></div>

                <div class="summary-row">
                    <span class="text-muted">Tạm tính</span>
                    <span id="checkout-subtotal">0 đ</span>
                </div>
                <div class="summary-row">
                    <span class="text-muted">Phí vận chuyển</span>
                    <span class="text-success">Miễn phí</span>
                </div>
                <div class="summary-row total">
                    <span>Tổng cộng</span>
                    <span id="checkout-total">0 đ</span>
                </div>

                <div id="checkout-error" class="text-danger mb-2" style="font-size:.9rem;"></div>

                <button class="btn-checkout" id="btn-place-order" onclick="placeOrder()">
                    Đặt hàng ngay
                </button>
                <a href="/carts/" class="btn btn-outline-secondary w-100 mt-2" style="border-radius:10px;">
                    Quay lại giỏ hàng
                </a>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-msg" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toast-text"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div data-include="/layout/footer.html"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';
let cartItems = [];
let addresses = [];

function showToast(msg, type) {
    let el = document.getElementById('toast-msg');
    el.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
    document.getElementById('toast-text').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
}

function fmt(n) {
    return Number(n || 0).toLocaleString('vi-VN') + ' đ';
}

function getToken() {
    return localStorage.getItem('token');
}

function renderLoginState() {
    document.querySelector('.container').innerHTML = `
        <div class="state-card">
            <div class="icon">🔒</div>
            <h4>Bạn chưa đăng nhập</h4>
            <p>Đăng nhập để tiếp tục đặt hàng.</p>
            <a href="/auth/" class="btn btn-primary px-4">Đăng nhập</a>
        </div>`;
}

function renderAddresses() {
    let root = document.getElementById('address-area');

    if (!addresses.length) {
        root.innerHTML = `
            <div class="alert alert-light border mb-0">
                Bạn chưa có địa chỉ đã lưu. Bạn vẫn có thể nhập địa chỉ thủ công ở bên dưới.
            </div>`;
        return;
    }

    root.innerHTML = addresses.map(function (address, index) {
        return `
            <label class="border rounded-3 p-3 d-flex gap-3 align-items-start mb-3">
                <input class="form-check-input mt-1" type="radio" name="address-id" value="${address._id}" ${address.isDefault || index === 0 ? 'checked' : ''}>
                <span>
                    <div class="fw-semibold">${address.fullName} - ${address.phone}</div>
                    <div class="text-muted">${[address.detail, address.ward, address.district, address.province].filter(Boolean).join(', ')}</div>
                    ${address.isDefault ? '<span class="badge bg-success mt-2">Mặc định</span>' : ''}
                </span>
            </label>`;
    }).join('');
}

function renderCartSummary() {
    let root = document.getElementById('checkout-items');

    if (!cartItems.length) {
        root.innerHTML = '<div class="text-muted">Giỏ hàng đang trống.</div>';
        document.getElementById('checkout-subtotal').textContent = fmt(0);
        document.getElementById('checkout-total').textContent = fmt(0);
        document.getElementById('btn-place-order').disabled = true;
        return;
    }

    let subtotal = 0;
    root.innerHTML = cartItems.map(function (item) {
        let price = item.product?.price || 0;
        let lineTotal = price * item.quantity;
        subtotal += lineTotal;
        return `
            <div class="d-flex justify-content-between gap-3 mb-2">
                <div>
                    <div class="fw-semibold" style="font-size:.92rem;">${item.product?.title || 'Sản phẩm'}</div>
                    <div class="text-muted" style="font-size:.82rem;">SL: ${item.quantity}</div>
                </div>
                <div class="fw-semibold">${fmt(lineTotal)}</div>
            </div>`;
    }).join('');

    document.getElementById('checkout-subtotal').textContent = fmt(subtotal);
    document.getElementById('checkout-total').textContent = fmt(subtotal);
    document.getElementById('btn-place-order').disabled = false;
}

async function loadCheckoutData() {
    let token = getToken();
    if (!token) {
        renderLoginState();
        return;
    }

    try {
        let [cartRes, addrRes] = await Promise.all([
            fetch(BASE + '/carts', {
                headers: { Authorization: 'Bearer ' + token }
            }),
            fetch(BASE + '/addresses', {
                headers: { Authorization: 'Bearer ' + token }
            })
        ]);

        let cartRaw = cartRes.ok ? await cartRes.json() : [];
        cartItems = Array.isArray(cartRaw) ? cartRaw : (cartRaw.items || []);
        addresses = addrRes.ok ? await addrRes.json() : [];

        await Promise.all(cartItems.map(async function (item) {
            if (typeof item.product === 'string') {
                let pr = await fetch(BASE + '/products/' + item.product);
                if (pr.ok) {
                    item.product = await pr.json();
                }
            }
        }));

        renderAddresses();
        renderCartSummary();
    } catch (err) {
        document.querySelector('.container').innerHTML =
            '<div class="state-card"><div class="icon">⚠️</div><p>Không thể tải dữ liệu checkout.</p></div>';
    }
}

function getSelectedPaymentMethod() {
    return document.querySelector('input[name="payment-method"]:checked')?.value || 'cod';
}

function getSelectedAddressId() {
    return document.querySelector('input[name="address-id"]:checked')?.value || '';
}

async function placeOrder() {
    let token = getToken();
    let manualAddress = document.getElementById('manual-address').value.trim();
    let addressId = getSelectedAddressId();
    let paymentMethod = getSelectedPaymentMethod();
    let errorEl = document.getElementById('checkout-error');

    errorEl.textContent = '';

    if (!cartItems.length) {
        errorEl.textContent = 'Giỏ hàng đang trống.';
        return;
    }

    if (!manualAddress && !addressId) {
        errorEl.textContent = 'Bạn cần chọn địa chỉ đã lưu hoặc nhập địa chỉ thủ công.';
        return;
    }

    let body = { paymentMethod: paymentMethod };
    if (manualAddress) {
        body.shippingAddress = manualAddress;
    } else {
        body.addressId = addressId;
    }

    let btn = document.getElementById('btn-place-order');
    btn.disabled = true;
    btn.textContent = 'Đang tạo đơn...';

    try {
        let res = await fetch(BASE + '/orders', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify(body)
        });

        let data = await res.json();
        if (!res.ok) {
            errorEl.textContent = data.message || 'Tạo đơn thất bại.';
            return;
        }

        showToast('Đặt hàng thành công', 'success');
        setTimeout(function () {
            window.location.href = '/orders/';
        }, 800);
    } catch (err) {
        errorEl.textContent = 'Lỗi kết nối server.';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Đặt hàng ngay';
    }
}

loadCheckoutData();
</script>
</body>
</html>
