<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gio hang - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/layout/load-layout.js" defer></script>
</head>
<body>

<div data-include="/layout/header.html"></div>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div id="cart-content">
                <div id="cart-skeleton">
                    <div class="cart-item-card">
                        <div class="skeleton-box" style="width:88px;height:88px;border-radius:10px;flex-shrink:0;"></div>
                        <div style="flex:1;">
                            <div class="skeleton-box mb-2" style="height:16px;width:60%;"></div>
                            <div class="skeleton-box mb-2" style="height:12px;width:35%;"></div>
                            <div class="skeleton-box" style="height:34px;width:120px;"></div>
                        </div>
                    </div>
                    <div class="cart-item-card">
                        <div class="skeleton-box" style="width:88px;height:88px;border-radius:10px;flex-shrink:0;"></div>
                        <div style="flex:1;">
                            <div class="skeleton-box mb-2" style="height:16px;width:50%;"></div>
                            <div class="skeleton-box mb-2" style="height:12px;width:30%;"></div>
                            <div class="skeleton-box" style="height:34px;width:120px;"></div>
                        </div>
                    </div>
                </div>
                <div id="cart-items-list"></div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="summary-card">
                <h5>Tom tat don hang</h5>

                <div class="summary-row">
                    <span class="text-muted">Tam tinh (<span id="item-count">0</span> san pham)</span>
                    <span id="subtotal">0 d</span>
                </div>
                <div class="summary-row">
                    <span class="text-muted">Phi van chuyen</span>
                    <span id="shipping-fee" class="text-success fw-semibold">Mien phi</span>
                </div>
                <div class="summary-row">
                    <span class="text-muted">Giam gia</span>
                    <span id="discount" class="text-danger">-0 d</span>
                </div>
                <div class="summary-row total">
                    <span>Tong cong</span>
                    <span id="total-price">0 d</span>
                </div>

                <div class="input-group coupon-wrap mb-2 mt-1">
                    <input type="text" id="coupon-input" class="form-control form-control-sm" placeholder="Nhap ma giam gia">
                    <button class="btn btn-outline-secondary btn-sm" onclick="applyCoupon()">Ap dung</button>
                </div>
                <div id="coupon-msg" style="font-size:.82rem; margin-bottom:8px;"></div>
                <div class="text-muted" style="font-size:.8rem;">
                    Ma hop le se duoc mang sang checkout va tinh lai tren backend.
                </div>

                <button class="btn-checkout" id="btn-checkout" onclick="goCheckout()">
                    Den trang dat hang
                </button>
                <a href="/products/" class="btn btn-outline-secondary w-100 mt-2" style="border-radius:10px; font-size:.9rem;">
                    Tiep tuc mua sam
                </a>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-msg" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toast-text"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div data-include="/layout/footer.html"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';
let cartData = null;
let couponDiscount = 0;
let appliedCoupon = null;

function showToast(msg, type) {
    let el = document.getElementById('toast-msg');
    el.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
    document.getElementById('toast-text').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
}

function fmt(n) {
    return Number(n || 0).toLocaleString('vi-VN') + ' đ';
}

function saveAppliedCoupon() {
    if (appliedCoupon) {
        sessionStorage.setItem('checkout_coupon', JSON.stringify(appliedCoupon));
    } else {
        sessionStorage.removeItem('checkout_coupon');
    }
}

function updateSummary() {
    if (!cartData || !cartData.items) return;

    let subtotal = cartData.items.reduce(function (sum, item) {
        let price = item.product?.price || 0;
        return sum + price * item.quantity;
    }, 0);

    let shipping = 0;
    let total = Math.max(0, subtotal + shipping - couponDiscount);

    document.getElementById('item-count').textContent = cartData.items.length;
    document.getElementById('subtotal').textContent = fmt(subtotal);
    document.getElementById('shipping-fee').textContent = shipping === 0 ? 'Mien phi' : fmt(shipping);
    document.getElementById('discount').textContent = '-' + fmt(couponDiscount);
    document.getElementById('total-price').textContent = fmt(total);
    document.getElementById('btn-checkout').disabled = cartData.items.length === 0;
}

function renderEmptyState() {
    document.getElementById('cart-content').innerHTML = `
        <div class="state-card">
            <div class="icon">Cart</div>
            <h4>Gio hang trong</h4>
            <p>Ban chua co san pham nao trong gio.</p>
            <a href="/products/" class="btn btn-primary px-4 py-2" style="border-radius:10px;">Mua sam ngay</a>
        </div>`;
}

function renderCart() {
    document.getElementById('cart-skeleton').style.display = 'none';
    let list = document.getElementById('cart-items-list');

    if (!cartData || !cartData.items || cartData.items.length === 0) {
        renderEmptyState();
        updateSummary();
        return;
    }

    list.innerHTML = cartData.items.map(function (item) {
        let product = item.product || {};
        let productId = typeof item.product === 'object' ? item.product._id : item.product;
        let image = Array.isArray(product.images) && product.images.length ? product.images[0] : '';

        return `
            <div class="cart-item-card">
                <div class="cart-img">
                    ${image ? `<img src="${image}" alt="${product.title || 'product'}">` : 'Img'}
                </div>
                <div class="cart-info">
                    <div class="name">${product.title || 'San pham'}</div>
                    <div class="cat">${product.category?.name || product.category || ''}</div>
                    <div class="price">${fmt(product.price || 0)}</div>
                </div>
                <div class="d-flex flex-column align-items-end gap-2">
                    <button class="btn-remove" title="Xoa" onclick="removeItem('${productId}')">X</button>
                    <div class="qty-control">
                        <button onclick="changeQty('${productId}', -1)">-</button>
                        <div class="qty-num">${item.quantity}</div>
                        <button onclick="changeQty('${productId}', 1)">+</button>
                    </div>
                    <small class="text-muted" style="font-size:.78rem;">${fmt((product.price || 0) * item.quantity)}</small>
                </div>
            </div>`;
    }).join('');

    updateSummary();
}

async function loadCart() {
    let token = localStorage.getItem('token');
    if (!token) {
        document.getElementById('cart-skeleton').style.display = 'none';
        document.getElementById('cart-content').innerHTML = `
            <div class="state-card">
                <div class="icon">Lock</div>
                <h4>Ban chua dang nhap</h4>
                <p>Dang nhap de xem gio hang va dat hang.</p>
                <a href="/auth/" class="btn btn-primary px-4 py-2">Dang nhap</a>
            </div>`;
        return;
    }

    try {
        let res = await fetch(BASE + '/carts', {
            headers: { Authorization: 'Bearer ' + token }
        });

        if (res.status === 403) {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            location.reload();
            return;
        }

        let raw = await res.json();
        cartData = { items: Array.isArray(raw) ? raw : (raw.items || []) };

        await Promise.all(cartData.items.map(async function (item) {
            if (typeof item.product === 'string') {
                let pr = await fetch(BASE + '/products/' + item.product);
                if (pr.ok) {
                    item.product = await pr.json();
                }
            }
        }));

        renderCart();

        if (appliedCoupon && cartData?.items?.length) {
            await applyCoupon(appliedCoupon.code, true);
        }
    } catch (err) {
        document.getElementById('cart-skeleton').style.display = 'none';
        document.getElementById('cart-items-list').innerHTML =
            '<div class="state-card"><div class="icon">!</div><p>Khong the tai gio hang.</p></div>';
    }
}

async function changeQty(productId, delta) {
    let token = localStorage.getItem('token');
    let url = delta > 0 ? BASE + '/carts/add-items' : BASE + '/carts/decrease-items';

    try {
        let res = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify({ product: productId, quantity: 1 })
        });

        if (!res.ok) {
            let data = await res.json();
            showToast(data.message || 'Thao tac that bai', 'danger');
            return;
        }

        await loadCart();
    } catch (err) {
        showToast('Loi ket noi server', 'danger');
    }
}

async function removeItem(productId) {
    let item = cartData?.items?.find(function (it) {
        let currentId = typeof it.product === 'object' ? it.product._id : it.product;
        return currentId === productId;
    });

    let qty = item?.quantity || 1;
    let token = localStorage.getItem('token');

    try {
        for (let i = 0; i < qty; i++) {
            await fetch(BASE + '/carts/decrease-items', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: 'Bearer ' + token
                },
                body: JSON.stringify({ product: productId, quantity: 1 })
            });
        }

        showToast('Da xoa san pham khoi gio', 'success');
        await loadCart();
    } catch (err) {
        showToast('Loi ket noi server', 'danger');
    }
}

async function applyCoupon(forceCode, silent) {
    let code = (forceCode || document.getElementById('coupon-input').value || '').trim();
    let token = localStorage.getItem('token');
    let msg = document.getElementById('coupon-msg');
    document.getElementById('coupon-input').value = code;

    if (!code) {
        couponDiscount = 0;
        appliedCoupon = null;
        saveAppliedCoupon();
        msg.textContent = '';
        updateSummary();
        return;
    }

    let subtotal = cartData?.items?.reduce(function (sum, item) {
        return sum + (item.product?.price || 0) * item.quantity;
    }, 0) || 0;

    try {
        let res = await fetch(BASE + '/coupons/validate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify({ code: code, orderValue: subtotal })
        });

        let data = await res.json();
        if (res.ok) {
            couponDiscount = data.discountAmount || 0;
            appliedCoupon = {
                code: data.code,
                discountAmount: couponDiscount,
                finalAmount: data.finalAmount || 0
            };
            saveAppliedCoupon();
            msg.innerHTML = `<span class="text-success">Ap dung thanh cong: giam ${fmt(couponDiscount)}</span>`;
        } else {
            couponDiscount = 0;
            appliedCoupon = null;
            saveAppliedCoupon();
            msg.innerHTML = `<span class="text-danger">${data.message || 'Ma khong hop le'}</span>`;
        }

        updateSummary();
    } catch (err) {
        if (!silent) {
            msg.innerHTML = '<span class="text-danger">Loi ket noi</span>';
        }
    }
}

function goCheckout() {
    if (!cartData || !cartData.items || cartData.items.length === 0) {
        showToast('Gio hang dang trong', 'warning');
        return;
    }

    saveAppliedCoupon();
    window.location.href = '/checkout/';
}

try {
    let savedCoupon = sessionStorage.getItem('checkout_coupon');
    if (savedCoupon) {
        appliedCoupon = JSON.parse(savedCoupon);
        couponDiscount = Number(appliedCoupon.discountAmount || 0);
    }
} catch {
    appliedCoupon = null;
    couponDiscount = 0;
}

loadCart();
</script>
</body>
</html>
