<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat hỗ trợ - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/layout/load-layout.js" defer></script>
</head>
<body>
<div data-include="/layout/header.html"></div>

<div class="container py-4 chat-shell">
    <h4 class="fw-bold mb-0">Chat hỗ trợ</h4>

    <div id="chat-state"></div>

    <div class="chat-box d-none" id="chat-box">
        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-form">
            <div class="input-group">
                <input type="text" id="message-input" class="form-control" placeholder="Nhập tin nhắn...">
                <button class="btn btn-primary" onclick="sendMessage()">Gửi</button>
            </div>
        </div>
    </div>
</div>

<div data-include="/layout/footer.html"></div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
const BASE = '/api/v1';
let socket = null;
let messages = [];
let pendingMessageIds = new Set();

function formatTime(date) {
    return new Date(date).toLocaleString('vi-VN');
}

function createClientMessageId() {
    return 'msg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
}

function hasMessage(messageId, clientMessageId) {
    return messages.some(function (item) {
        if (messageId && String(item._id || '') === String(messageId)) return true;
        if (clientMessageId && item.clientMessageId === clientMessageId) return true;
        return false;
    });
}

function pushMessageIfNeeded(message) {
    if (hasMessage(message._id, message.clientMessageId)) {
        return;
    }

    messages.push(message);
}

function renderState(html) {
    document.getElementById('chat-state').innerHTML = html;
}

function renderMessages() {
    let box = document.getElementById('chat-messages');

    if (!messages.length) {
        box.innerHTML = '<div class="chat-empty">Chưa có tin nhắn nào.</div>';
        return;
    }

    box.innerHTML = messages.map(function (item) {
        let type = item.senderType === 'USER' ? 'user' : 'admin';
        let senderName = item.senderType === 'USER' ? 'Bạn' : 'Admin';

        return `
            <div class="chat-item ${type}">
                <div class="chat-bubble">
                    <div>${item.content}</div>
                    <div class="chat-meta">${senderName} • ${formatTime(item.createdAt)}</div>
                </div>
            </div>
        `;
    }).join('');

    box.scrollTop = box.scrollHeight;
}

async function loadHistory() {
    let token = localStorage.getItem('token');

    let res = await fetch(BASE + '/chats/my-messages', {
        headers: {
            Authorization: 'Bearer ' + token
        }
    });

    if (!res.ok) {
        throw new Error('Khong the tai lich su chat');
    }

    messages = await res.json();
    renderMessages();
}

function connectSocket() {
    let token = localStorage.getItem('token');

    socket = io(window.location.origin, {
        ackTimeout: 5000,
        retries: 2,
        transports: ['websocket'],
        auth: {
            token: token
        }
    });

    let isFirstConnect = true;
    socket.on('connect', function () {
        if (isFirstConnect) {
            isFirstConnect = false;
            return;
        }
        // Reconnect: tải lại lịch sử để lấy các tin nhắn đã bị bỏ lỡ
        loadHistory().catch(function () {});
    });

    socket.on('connect_error', function (err) {
        renderState('<div class="alert alert-danger">Lỗi socket: ' + err.message + '</div>');
    });

    socket.on('new-message', function (message) {
        pushMessageIfNeeded(message);
        if (message.clientMessageId) {
            pendingMessageIds.delete(message.clientMessageId);
        }
        renderMessages();
    });

    socket.on('error-message', function (data) {
        alert(data.message);
    });
}

function sendMessage() {
    let input = document.getElementById('message-input');
    let content = input.value.trim();

    if (!content || !socket) return;
    
    let clientMessageId = createClientMessageId();
    if (pendingMessageIds.has(clientMessageId)) return;
    pendingMessageIds.add(clientMessageId);

    socket.timeout(5000).emit('send-message', {
        content: content,
        clientMessageId: clientMessageId
    }, function (err, response) {
        if (err) {
            pendingMessageIds.delete(clientMessageId);
            alert('Gui tin nhan that bai. Ban thu lai giup minh.');
            return;
        }

        if (!response || !response.ok) {
            pendingMessageIds.delete(clientMessageId);
            alert(response && response.message ? response.message : 'Gui tin nhan that bai');
            return;
        }
    });

    input.value = '';
}

async function initChatPage() {
    let token = localStorage.getItem('token');
    let role = localStorage.getItem('role');

    if (!token) {
        renderState('<div class="alert alert-warning">Bạn chưa đăng nhập.</div>');
        return;
    }

    if (role === 'ADMIN') {
        renderState('<div class="alert alert-warning">Admin không dùng trang chat user.</div>');
        return;
    }

    try {
        document.getElementById('chat-box').classList.remove('d-none');
        connectSocket();
        await loadHistory();
    } catch (err) {
        renderState('<div class="alert alert-danger">' + err.message + '</div>');
    }
}

document.getElementById('message-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
});

initChatPage();
</script>
</body>
</html>
