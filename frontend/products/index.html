<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm – ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/layout/load-layout.js" defer></script>
</head>
<body>

<div data-include="/layout/header.html"></div>


<div class="container py-4">
    <div class="row g-4">

        <!-- ═══ SIDEBAR FILTER ═══ -->
        <div class="col-lg-3 d-none d-lg-block">
            <div class="filter-card">

                <h6>🔍 Tìm kiếm</h6>
                <input type="text" id="search-input" class="form-control mb-4"
                       placeholder="Tên sản phẩm...">

                <h6>📂 Danh mục</h6>
                <div class="d-flex flex-wrap gap-2 mb-4" id="categories-pills">
                    <span class="cat-pill active" data-cat="">Tất cả</span>
                    <span class="cat-pill" data-cat="áo">Áo</span>
                    <span class="cat-pill" data-cat="quần">Quần</span>
                    <span class="cat-pill" data-cat="giày">Giày</span>
                    <span class="cat-pill" data-cat="phụ kiện">Phụ kiện</span>
                </div>

                <h6>💰 Khoảng giá</h6>
                <div class="d-flex gap-2 mb-1">
                    <input type="number" id="min-price" class="form-control" placeholder="Từ" min="0">
                    <input type="number" id="max-price" class="form-control" placeholder="Đến" min="0">
                </div>
                <small class="text-muted">Đơn vị: VNĐ</small>

                <button class="btn btn-primary w-100 mt-4" style="border-radius:9px;" onclick="applyFilters()">
                    Áp dụng lọc
                </button>
                <button class="btn btn-outline-secondary w-100 mt-2" style="border-radius:9px;" onclick="resetFilters()">
                    Xóa bộ lọc
                </button>
            </div>
        </div>

        <!-- ═══ MAIN CONTENT ═══ -->
        <div class="col-lg-9">

            <!-- Mobile search bar -->
            <div class="d-lg-none mb-3">
                <div class="input-group">
                    <input type="text" id="search-mobile" class="form-control" placeholder="Tìm sản phẩm..."
                           style="border-radius:10px 0 0 10px; border-color:#dee2e6;">
                    <button class="btn btn-primary px-3" style="border-radius:0 10px 10px 0;" onclick="applyFilters()">🔍</button>
                </div>
            </div>

            <!-- Sort / result bar -->
            <div class="sort-bar">
                <span class="result-count" id="result-count">Đang tải...</span>
                <div class="d-flex align-items-center gap-2">
                    <label class="mb-0" style="font-size:.85rem; color:#6c757d;">Sắp xếp:</label>
                    <select id="sort-select" class="form-select form-select-sm" style="width:auto;" onchange="applyFilters()">
                        <option value="">Mặc định</option>
                        <option value="price-asc">Giá tăng dần</option>
                        <option value="price-desc">Giá giảm dần</option>
                    </select>
                </div>
            </div>

            <!-- Product grid -->
            <div class="row g-3" id="product-grid"></div>

            <!-- Pagination -->
            <div class="d-flex justify-content-center mt-4" id="pagination-wrap"></div>
        </div>

    </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-msg" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toast-text"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div data-include="/layout/footer.html"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';
let currentPage = 1;
const LIMIT = 12;
let allProducts = [];
let filteredProducts = [];

/* ── Toast ── */
function showToast(msg, type) {
    let el = document.getElementById('toast-msg');
    el.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
    document.getElementById('toast-text').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
}

/* ── Format ── */
function formatPrice(n) {
    return Number(n).toLocaleString('vi-VN') + ' đ';
}

/* ── Skeleton ── */
function renderSkeletons() {
    let grid = document.getElementById('product-grid');
    grid.innerHTML = '';
    for (let i = 0; i < 8; i++) {
        grid.innerHTML += `
        <div class="col-6 col-md-4">
            <div class="card border-0 shadow-sm" style="border-radius:14px;overflow:hidden;">
                <div class="skeleton-box" style="height:210px;border-radius:0;"></div>
                <div class="p-3">
                    <div class="skeleton-box mb-2" style="height:15px;width:75%;"></div>
                    <div class="skeleton-box mb-3" style="height:12px;width:45%;"></div>
                    <div class="skeleton-box" style="height:36px;"></div>
                </div>
            </div>
        </div>`;
    }
    document.getElementById('result-count').textContent = 'Đang tải...';
}

/* ── Render card ── */
function createCard(p) {
    let col = document.createElement('div');
    col.className = 'col-6 col-md-4';

    let hasImg = p.images && p.images.length > 0 && !p.images[0].includes('example.com');
    let imgHtml = hasImg
        ? `<img src="${p.images[0]}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;">`
        : `<div class="no-img">👕</div>`;

    col.innerHTML = `
        <div class="card product-card shadow-sm">
            <a href="/products/detail/?id=${p._id}" class="text-decoration-none">
                <div class="product-img-wrap">${imgHtml}</div>
            </a>
            <div class="card-body">
                <a href="/products/detail/?id=${p._id}" class="text-decoration-none">
                    <div class="product-title">${p.title || 'Sản phẩm'}</div>
                </a>
                <div class="product-cat">${p.category || ''}</div>
                <div class="d-flex align-items-center justify-content-between">
                    <span class="price-tag">${formatPrice(p.price || 0)}</span>
                    <span class="product-sku">SKU: ${p.sku || ''}</span>
                </div>
                <button class="btn btn-dark btn-add-cart" data-id="${p._id}" data-name="${p.title}">
                    🛒 Thêm vào giỏ
                </button>
            </div>
        </div>`;

    let img = col.querySelector('img');
    if (img) img.addEventListener('error', function () {
        this.parentNode.innerHTML = '<div class="no-img">👕</div>';
    });

    col.querySelector('.btn-add-cart').addEventListener('click', addToCart);
    return col;
}

/* ── Render page ── */
function renderPage(page) {
    currentPage = page;
    let grid = document.getElementById('product-grid');
    grid.innerHTML = '';

    let start = (page - 1) * LIMIT;
    let pageData = filteredProducts.slice(start, start + LIMIT);

    if (pageData.length === 0) {
        grid.innerHTML = `
            <div class="col-12">
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <h5>Không tìm thấy sản phẩm</h5>
                    <p>Thử điều chỉnh bộ lọc hoặc tìm kiếm từ khác.</p>
                    <button class="btn btn-outline-primary btn-sm" onclick="resetFilters()">Xóa bộ lọc</button>
                </div>
            </div>`;
        renderPagination();
        return;
    }

    pageData.forEach(p => grid.appendChild(createCard(p)));
    renderPagination();
}

/* ── Pagination ── */
function renderPagination() {
    let wrap = document.getElementById('pagination-wrap');
    let total = filteredProducts.length;
    let pages = Math.ceil(total / LIMIT);

    document.getElementById('result-count').textContent =
        `Hiển thị ${Math.min(filteredProducts.length, LIMIT)} / ${total} sản phẩm`;

    if (pages <= 1) { wrap.innerHTML = ''; return; }

    let html = '<ul class="pagination">';
    html += `<li class="page-item ${currentPage===1?'disabled':''}">
        <a class="page-link" href="#" onclick="renderPage(${currentPage-1});return false;">‹</a></li>`;
    for (let i = 1; i <= pages; i++) {
        html += `<li class="page-item ${i===currentPage?'active':''}">
            <a class="page-link" href="#" onclick="renderPage(${i});return false;">${i}</a></li>`;
    }
    html += `<li class="page-item ${currentPage===pages?'disabled':''}">
        <a class="page-link" href="#" onclick="renderPage(${currentPage+1});return false;">›</a></li>`;
    html += '</ul>';
    wrap.innerHTML = html;
}

/* ── Load all products ── */
async function loadAllProducts() {
    renderSkeletons();
    try {
        let res = await fetch(BASE + '/products?limit=100&page=1');
        let data = await res.json();
        allProducts = Array.isArray(data) ? data : (data.products || data.data || []);
        filteredProducts = [...allProducts];
        renderPage(1);
    } catch {
        document.getElementById('product-grid').innerHTML =
            '<div class="col-12"><div class="empty-state"><div class="icon">⚠️</div><p>Không thể tải sản phẩm. Hãy chắc server đang chạy.</p></div></div>';
        document.getElementById('result-count').textContent = '';
    }
}

async function loadCategoriesPills() {
    try {
        let res = await fetch(BASE + '/categories');
        let data = await res.json();
        let list = Array.isArray(data) ? data : [];
        let wrap = document.getElementById('categories-pills');
        if (!wrap) return;
        wrap.innerHTML = '<span class="cat-pill active" data-cat="">Tat ca</span>'
            + list.map(function (item) {
                return `<span class="cat-pill" data-cat="${item.name || ''}">${item.name || ''}</span>`;
            }).join('');
        bindCategoryPills();
    } catch {}
}

function bindCategoryPills() {
    document.querySelectorAll('.cat-pill').forEach(function (pill) {
        pill.addEventListener('click', function () {
            document.querySelectorAll('.cat-pill').forEach(function (p) { p.classList.remove('active'); });
            this.classList.add('active');
            applyFilters();
        });
    });
}

/* ── Apply filters ── */
function applyFilters() {
    let q = (document.getElementById('search-input')?.value || document.getElementById('search-mobile')?.value || '').trim().toLowerCase();
    let cat = document.querySelector('.cat-pill.active')?.dataset.cat || '';
    let minP = parseFloat(document.getElementById('min-price')?.value) || 0;
    let maxP = parseFloat(document.getElementById('max-price')?.value) || Infinity;
    let sort = document.getElementById('sort-select').value;

    filteredProducts = allProducts.filter(p => {
        let matchQ   = !q   || (p.title || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
        let matchCat = !cat || (p.category || '').toLowerCase().includes(cat.toLowerCase());
        let matchMin = p.price >= minP;
        let matchMax = p.price <= maxP;
        return matchQ && matchCat && matchMin && matchMax;
    });

    if (sort === 'price-asc')  filteredProducts.sort((a, b) => a.price - b.price);
    if (sort === 'price-desc') filteredProducts.sort((a, b) => b.price - a.price);

    renderPage(1);
}

/* ── Reset ── */
function resetFilters() {
    let si = document.getElementById('search-input');
    let sm = document.getElementById('search-mobile');
    if (si) si.value = '';
    if (sm) sm.value = '';
    document.getElementById('min-price').value = '';
    document.getElementById('max-price').value = '';
    document.getElementById('sort-select').value = '';
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    document.querySelector('.cat-pill[data-cat=""]').classList.add('active');
    filteredProducts = [...allProducts];
    renderPage(1);
}

/* ── Category pills ── */
bindCategoryPills();

/* ── Search on Enter ── */
['search-input', 'search-mobile'].forEach(id => {
    let el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') applyFilters(); });
});

/* ── Add to cart ── */
async function addToCart(e) {
    let btn = e.currentTarget;
    let id = btn.dataset.id, name = btn.dataset.name;
    let token = localStorage.getItem('token');

    if (!token) {
        showToast('Vui lòng đăng nhập để thêm vào giỏ!', 'warning');
        setTimeout(() => window.location.href = '/auth/', 1200);
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

    try {
        let res = await fetch(BASE + '/carts/add-items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ product: id, quantity: 1 })
        });
        if (res.ok) showToast('Đã thêm "' + name + '" vào giỏ! 🎉', 'success');
        else { let d = await res.json(); showToast(d.message || 'Thêm thất bại', 'danger'); }
    } catch { showToast('Lỗi kết nối server', 'danger'); }
    finally { btn.disabled = false; btn.innerHTML = '🛒 Thêm vào giỏ'; }
}

loadCategoriesPills();
loadAllProducts();
</script>
</body>
</html>
