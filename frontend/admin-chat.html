<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        h1, h2 {
            margin-top: 0;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: bold;
        }

        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .actions button {
            cursor: pointer;
        }

        #status {
            padding: 10px;
            border-radius: 8px;
            background: #ecfeff;
        }

        #rooms {
            min-height: 140px;
            max-height: 260px;
            overflow-y: auto;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
        }

        .room {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #dbeafe;
            background: #eff6ff;
            margin-bottom: 10px;
            cursor: pointer;
        }

        #messages {
            min-height: 260px;
            max-height: 420px;
            overflow-y: auto;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #e5e7eb;
        }

        .message.user {
            border-left: 4px solid #2563eb;
        }

        .message.admin {
            border-left: 4px solid #16a34a;
        }

        .meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        #log {
            min-height: 120px;
            max-height: 220px;
            overflow-y: auto;
            background: #111827;
            color: #22c55e;
            border-radius: 10px;
            padding: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Trang Test ADMIN Chat</h1>

            <div class="row">
                <div>
                    <label for="serverUrl">Server URL</label>
                    <input id="serverUrl" type="text" value="http://localhost:3000">
                </div>
                <div>
                    <label for="roomsUrl">API danh sach room</label>
                    <input id="roomsUrl" type="text" value="http://localhost:3000/api/v1/chats/rooms">
                </div>
            </div>

            <label for="adminToken">Token ADMIN</label>
            <textarea id="adminToken" placeholder="Dan token ADMIN vao day"></textarea>

            <div class="actions">
                <button id="connectBtn">Ket noi</button>
                <button id="loadRoomsBtn">Tai danh sach room</button>
                <button id="disconnectBtn">Ngat ket noi</button>
            </div>

            <div id="status">Trang thai: Chua ket noi</div>
        </div>

        <div class="card">
            <h2>Danh sach room</h2>
            <div id="rooms"></div>
        </div>

        <div class="card">
            <h2>Chon user chat</h2>
            <div class="row-3">
                <div>
                    <label for="userId">User ID</label>
                    <input id="userId" type="text" placeholder="Nhap hoac bam vao room ben tren">
                </div>
                <div>
                    <label for="messagesUrl">API lich su chat</label>
                    <input id="messagesUrl" type="text" value="http://localhost:3000/api/v1/chats/messages/">
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button id="joinRoomBtn">Vao room user</button>
                </div>
            </div>

            <div class="actions">
                <button id="loadMessagesBtn">Tai lich su user nay</button>
            </div>
        </div>

        <div class="card">
            <h2>Lich su tin nhan</h2>
            <div id="messages"></div>
        </div>

        <div class="card">
            <h2>Gui tin nhan</h2>
            <label for="content">Noi dung</label>
            <textarea id="content" placeholder="Nhap noi dung admin muon gui"></textarea>
            <div class="actions">
                <button id="sendBtn">Gui tin nhan</button>
            </div>
        </div>

        <div class="card">
            <h2>Log</h2>
            <div id="log"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        let socket = null;

        let serverUrlInput = document.getElementById('serverUrl');
        let roomsUrlInput = document.getElementById('roomsUrl');
        let adminTokenInput = document.getElementById('adminToken');
        let userIdInput = document.getElementById('userId');
        let messagesUrlInput = document.getElementById('messagesUrl');
        let contentInput = document.getElementById('content');
        let roomsDiv = document.getElementById('rooms');
        let messagesDiv = document.getElementById('messages');
        let logDiv = document.getElementById('log');
        let statusDiv = document.getElementById('status');

        function addLog(message) {
            let time = new Date().toLocaleTimeString();
            logDiv.textContent += '[' + time + '] ' + message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearMessages() {
            messagesDiv.innerHTML = '';
        }

        function renderMessage(message) {
            let box = document.createElement('div');
            let senderType = message.senderType || 'USER';
            box.className = 'message ' + senderType.toLowerCase();

            let senderName = 'Khong ro';
            if (message.sender) {
                senderName = message.sender.fullName || message.sender.username || 'Khong ro';
            }

            let createdAt = message.createdAt ? new Date(message.createdAt).toLocaleString() : '';

            box.innerHTML =
                '<div class="meta">' + senderType + ' | ' + senderName + ' | ' + createdAt + '</div>' +
                '<div>' + (message.content || '') + '</div>';

            messagesDiv.appendChild(box);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function loadRooms() {
            let token = adminTokenInput.value.trim();
            let roomsUrl = roomsUrlInput.value.trim();

            if (!token) {
                alert('Ban phai nhap token ADMIN');
                return;
            }

            let response = await fetch(roomsUrl, {
                headers: {
                    Authorization: 'Bearer ' + token
                }
            });

            let data = await response.json();
            roomsDiv.innerHTML = '';

            if (!Array.isArray(data)) {
                addLog('Tai room that bai');
                return;
            }

            data.forEach(function (room) {
                let item = document.createElement('div');
                item.className = 'room';

                let userId = room.user ? room.user._id : '';
                let userName = room.user ? (room.user.fullName || room.user.username || room.user.email) : 'Khong ro';
                let lastMessage = room.lastMessage || '';

                item.innerHTML =
                    '<div><strong>' + userName + '</strong></div>' +
                    '<div>User ID: ' + userId + '</div>' +
                    '<div>Tin nhan cuoi: ' + lastMessage + '</div>';

                item.onclick = function () {
                    userIdInput.value = userId;
                    addLog('Da chon user: ' + userId);
                };

                roomsDiv.appendChild(item);
            });

            addLog('Da tai ' + data.length + ' room');
        }

        async function loadMessages() {
            let token = adminTokenInput.value.trim();
            let userId = userIdInput.value.trim();
            let baseUrl = messagesUrlInput.value.trim();

            if (!token) {
                alert('Ban phai nhap token ADMIN');
                return;
            }

            if (!userId) {
                alert('Ban phai nhap userId');
                return;
            }

            let response = await fetch(baseUrl + userId, {
                headers: {
                    Authorization: 'Bearer ' + token
                }
            });

            let data = await response.json();
            clearMessages();

            if (!Array.isArray(data)) {
                addLog('Tai lich su that bai');
                return;
            }

            data.forEach(renderMessage);
            addLog('Da tai ' + data.length + ' tin nhan');
        }

        document.getElementById('connectBtn').onclick = function () {
            let serverUrl = serverUrlInput.value.trim();
            let token = adminTokenInput.value.trim();

            if (!token) {
                alert('Ban phai nhap token ADMIN');
                return;
            }

            if (socket) {
                socket.disconnect();
            }

            socket = io(serverUrl, {
                transports: ['websocket'],
                auth: {
                    token: token
                }
            });

            socket.on('connect', function () {
                statusDiv.textContent = 'Trang thai: Da ket noi';
                addLog('Ket noi thanh cong. Socket ID: ' + socket.id);
            });

            socket.on('joined-room', function (data) {
                addLog('ADMIN da vao room: ' + data.room);
            });

            socket.on('new-message', function (message) {
                let currentUserId = userIdInput.value.trim();
                let roomUserId = '';

                if (message.room && typeof message.room === 'object' && message.room.user) {
                    roomUserId = message.room.user;
                }

                if (!currentUserId || !roomUserId || currentUserId === roomUserId) {
                    renderMessage(message);
                }

                addLog('Nhan tin nhan moi');
            });

            socket.on('error-message', function (data) {
                addLog('Loi: ' + data.message);
            });

            socket.on('connect_error', function (err) {
                statusDiv.textContent = 'Trang thai: Ket noi that bai';
                addLog('Loi ket noi: ' + err.message);
            });

            socket.on('disconnect', function () {
                statusDiv.textContent = 'Trang thai: Da ngat ket noi';
                addLog('Da ngat ket noi');
            });
        };

        document.getElementById('loadRoomsBtn').onclick = function () {
            loadRooms().catch(function (err) {
                addLog('Loi tai room: ' + err.message);
            });
        };

        document.getElementById('joinRoomBtn').onclick = function () {
            let userId = userIdInput.value.trim();

            if (!socket) {
                alert('Ban chua ket noi socket');
                return;
            }

            if (!userId) {
                alert('Ban phai nhap userId');
                return;
            }

            socket.emit('join-room', {
                userId: userId
            });
        };

        document.getElementById('loadMessagesBtn').onclick = function () {
            loadMessages().catch(function (err) {
                addLog('Loi tai lich su: ' + err.message);
            });
        };

        document.getElementById('sendBtn').onclick = function () {
            let userId = userIdInput.value.trim();
            let content = contentInput.value.trim();

            if (!socket) {
                alert('Ban chua ket noi socket');
                return;
            }

            if (!userId) {
                alert('Ban phai nhap userId');
                return;
            }

            if (!content) {
                alert('Noi dung khong duoc de trong');
                return;
            }

            socket.emit('send-message', {
                userId: userId,
                content: content
            });

            contentInput.value = '';
            addLog('Admin da gui tin nhan');
        };

        document.getElementById('disconnectBtn').onclick = function () {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        };
    </script>
</body>
</html>
