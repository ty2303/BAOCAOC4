<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Chat Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        h1, h2 {
            margin-top: 0;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: bold;
        }

        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .actions button {
            cursor: pointer;
        }

        #status {
            padding: 10px;
            border-radius: 8px;
            background: #eef2ff;
        }

        #messages {
            min-height: 260px;
            max-height: 420px;
            overflow-y: auto;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #e5e7eb;
        }

        .message.user {
            border-left: 4px solid #2563eb;
        }

        .message.admin {
            border-left: 4px solid #16a34a;
        }

        .meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        #log {
            min-height: 120px;
            max-height: 220px;
            overflow-y: auto;
            background: #111827;
            color: #22c55e;
            border-radius: 10px;
            padding: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Trang Test USER Chat</h1>

            <div class="row">
                <div>
                    <label for="serverUrl">Server URL</label>
                    <input id="serverUrl" type="text" value="http://localhost:3000">
                </div>
                <div>
                    <label for="historyUrl">API lich su chat</label>
                    <input id="historyUrl" type="text" value="http://localhost:3000/api/v1/chats/my-messages">
                </div>
            </div>

            <label for="token">Token USER</label>
            <textarea id="token" placeholder="Dan token USER vao day"></textarea>

            <div class="actions">
                <button id="connectBtn">Ket noi</button>
                <button id="loadBtn">Tai lich su</button>
                <button id="disconnectBtn">Ngat ket noi</button>
            </div>

            <div id="status">Trang thai: Chua ket noi</div>
        </div>

        <div class="card">
            <h2>Lich su tin nhan</h2>
            <div id="messages"></div>
        </div>

        <div class="card">
            <h2>Gui tin nhan</h2>
            <label for="content">Noi dung</label>
            <textarea id="content" placeholder="Nhap noi dung user muon gui cho admin"></textarea>
            <div class="actions">
                <button id="sendBtn">Gui tin nhan</button>
            </div>
        </div>

        <div class="card">
            <h2>Log</h2>
            <div id="log"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        let socket = null;

        let serverUrlInput = document.getElementById('serverUrl');
        let historyUrlInput = document.getElementById('historyUrl');
        let tokenInput = document.getElementById('token');
        let statusDiv = document.getElementById('status');
        let messagesDiv = document.getElementById('messages');
        let logDiv = document.getElementById('log');
        let contentInput = document.getElementById('content');

        function addLog(message) {
            let time = new Date().toLocaleTimeString();
            logDiv.textContent += '[' + time + '] ' + message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function renderMessage(message) {
            let box = document.createElement('div');
            let senderType = message.senderType || 'USER';
            box.className = 'message ' + senderType.toLowerCase();

            let senderName = 'Khong ro';
            if (message.sender) {
                senderName = message.sender.fullName || message.sender.username || 'Khong ro';
            }

            let createdAt = message.createdAt ? new Date(message.createdAt).toLocaleString() : '';

            box.innerHTML =
                '<div class="meta">' + senderType + ' | ' + senderName + ' | ' + createdAt + '</div>' +
                '<div>' + (message.content || '') + '</div>';

            messagesDiv.appendChild(box);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearMessages() {
            messagesDiv.innerHTML = '';
        }

        async function loadHistory() {
            let token = tokenInput.value.trim();
            let historyUrl = historyUrlInput.value.trim();

            if (!token) {
                alert('Ban phai nhap token USER');
                return;
            }

            let response = await fetch(historyUrl, {
                headers: {
                    Authorization: 'Bearer ' + token
                }
            });

            let data = await response.json();
            clearMessages();

            if (!Array.isArray(data)) {
                addLog('Tai lich su that bai');
                return;
            }

            data.forEach(renderMessage);
            addLog('Da tai ' + data.length + ' tin nhan');
        }

        document.getElementById('connectBtn').onclick = function () {
            let serverUrl = serverUrlInput.value.trim();
            let token = tokenInput.value.trim();

            if (!token) {
                alert('Ban phai nhap token USER');
                return;
            }

            if (socket) {
                socket.disconnect();
            }

            socket = io(serverUrl, {
                transports: ['websocket'],
                auth: {
                    token: token
                }
            });

            socket.on('connect', function () {
                statusDiv.textContent = 'Trang thai: Da ket noi';
                addLog('Ket noi thanh cong. Socket ID: ' + socket.id);
            });

            socket.on('new-message', function (message) {
                renderMessage(message);
                addLog('Nhan tin nhan moi');
            });

            socket.on('error-message', function (data) {
                addLog('Loi: ' + data.message);
            });

            socket.on('connect_error', function (err) {
                statusDiv.textContent = 'Trang thai: Ket noi that bai';
                addLog('Loi ket noi: ' + err.message);
            });

            socket.on('disconnect', function () {
                statusDiv.textContent = 'Trang thai: Da ngat ket noi';
                addLog('Da ngat ket noi');
            });
        };

        document.getElementById('loadBtn').onclick = function () {
            loadHistory().catch(function (err) {
                addLog('Loi tai lich su: ' + err.message);
            });
        };

        document.getElementById('disconnectBtn').onclick = function () {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        };

        document.getElementById('sendBtn').onclick = function () {
            let content = contentInput.value.trim();

            if (!socket) {
                alert('Ban chua ket noi socket');
                return;
            }

            if (!content) {
                alert('Noi dung khong duoc de trong');
                return;
            }

            socket.emit('send-message', {
                content: content
            });

            contentInput.value = '';
            addLog('Da gui tin nhan');
        };
    </script>
</body>
</html>
