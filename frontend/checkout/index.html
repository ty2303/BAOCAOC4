<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dat hang - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/layout/load-layout.js" defer></script>
</head>
<body>

<div data-include="/layout/header.html"></div>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Chon dia chi giao hang</h5>
                    <div id="address-area">
                        <div class="skeleton-box" style="height:120px;border-radius:14px;"></div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Nhap dia chi thu cong</h5>
                    <textarea id="manual-address" class="form-control" rows="4" placeholder="Vi du: 123 Nguyen Trai, Thanh Xuan, Ha Noi" style="border-radius:10px;"></textarea>
                    <div class="form-text">Neu nhap o day, he thong uu tien dia chi thu cong thay vi address da luu.</div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Ma giam gia</h5>
                    <div class="input-group coupon-wrap mb-2 mt-1">
                        <input type="text" id="coupon-input" class="form-control form-control-sm" placeholder="Nhap ma giam gia">
                        <button class="btn btn-outline-secondary btn-sm" onclick="applyCoupon()">Ap dung</button>
                    </div>
                    <div id="coupon-msg" class="small"></div>
                </div>
            </div>

            <div class="card border-0 shadow-sm" style="border-radius:14px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Phuong thuc thanh toan</h5>
                    <div class="d-flex flex-column gap-2">
                        <label class="border rounded-3 p-3 d-flex gap-2 align-items-start">
                            <input class="form-check-input mt-1" type="radio" name="payment-method" value="cod" checked>
                            <span>
                                <div class="fw-semibold">Thanh toan khi nhan hang (COD)</div>
                                <div class="text-muted" style="font-size:.9rem;">Phu hop nhat voi luong hien tai.</div>
                            </span>
                        </label>
                        <label class="border rounded-3 p-3 d-flex gap-2 align-items-start">
                            <input class="form-check-input mt-1" type="radio" name="payment-method" value="banking">
                            <span>
                                <div class="fw-semibold">Chuyen khoan</div>
                                <div class="text-muted" style="font-size:.9rem;">Hien moi tao transaction noi bo.</div>
                            </span>
                        </label>
                        <label class="border rounded-3 p-3 d-flex gap-2 align-items-start">
                            <input class="form-check-input mt-1" type="radio" name="payment-method" value="momo">
                            <span>
                                <div class="fw-semibold">Vi MoMo</div>
                                <div class="text-muted" style="font-size:.9rem;">Chua tich hop cong thanh toan that.</div>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="summary-card">
                <h5>Xac nhan don hang</h5>
                <div id="checkout-items" class="mb-3"></div>

                <div class="summary-row">
                    <span class="text-muted">Tam tinh</span>
                    <span id="checkout-subtotal">0 d</span>
                </div>
                <div class="summary-row">
                    <span class="text-muted">Phi van chuyen</span>
                    <span class="text-success">Mien phi</span>
                </div>
                <div class="summary-row">
                    <span class="text-muted">Giam gia</span>
                    <span id="checkout-discount" class="text-danger">-0 d</span>
                </div>
                <div class="summary-row total">
                    <span>Tong cong</span>
                    <span id="checkout-total">0 d</span>
                </div>

                <div id="checkout-error" class="text-danger mb-2" style="font-size:.9rem;"></div>

                <button class="btn-checkout" id="btn-place-order" onclick="placeOrder()">
                    Dat hang ngay
                </button>
                <a href="/carts/" class="btn btn-outline-secondary w-100 mt-2" style="border-radius:10px;">
                    Quay lai gio hang
                </a>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-msg" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toast-text"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div data-include="/layout/footer.html"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';
let cartItems = [];
let addresses = [];
let appliedCoupon = null;
let subtotalAmount = 0;

function showToast(msg, type) {
    let el = document.getElementById('toast-msg');
    el.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
    document.getElementById('toast-text').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
}

function fmt(n) {
    return Number(n || 0).toLocaleString('vi-VN') + ' d';
}

function getToken() {
    return localStorage.getItem('token');
}

function getDiscountAmount() {
    return Number(appliedCoupon?.discountAmount || 0);
}

function getFinalAmount() {
    return Math.max(0, subtotalAmount - getDiscountAmount());
}

function renderLoginState() {
    document.querySelector('.container').innerHTML = `
        <div class="state-card">
            <div class="icon">Lock</div>
            <h4>Ban chua dang nhap</h4>
            <p>Dang nhap de tiep tuc dat hang.</p>
            <a href="/auth/" class="btn btn-primary px-4">Dang nhap</a>
        </div>`;
}

function renderAddresses() {
    let root = document.getElementById('address-area');

    if (!addresses.length) {
        root.innerHTML = `
            <div class="alert alert-light border mb-0">
                Ban chua co dia chi da luu. Ban van co the nhap dia chi thu cong o ben duoi.
            </div>`;
        return;
    }

    root.innerHTML = addresses.map(function (address, index) {
        return `
            <label class="border rounded-3 p-3 d-flex gap-3 align-items-start mb-3">
                <input class="form-check-input mt-1" type="radio" name="address-id" value="${address._id}" ${address.isDefault || index === 0 ? 'checked' : ''}>
                <span>
                    <div class="fw-semibold">${address.fullName} - ${address.phone}</div>
                    <div class="text-muted">${[address.detail, address.ward, address.district, address.province].filter(Boolean).join(', ')}</div>
                    ${address.isDefault ? '<span class="badge bg-success mt-2">Mac dinh</span>' : ''}
                </span>
            </label>`;
    }).join('');
}

function renderSummaryTotals() {
    document.getElementById('checkout-subtotal').textContent = fmt(subtotalAmount);
    document.getElementById('checkout-discount').textContent = '-' + fmt(getDiscountAmount());
    document.getElementById('checkout-total').textContent = fmt(getFinalAmount());
}

function renderCartSummary() {
    let root = document.getElementById('checkout-items');

    if (!cartItems.length) {
        root.innerHTML = '<div class="text-muted">Gio hang dang trong.</div>';
        subtotalAmount = 0;
        renderSummaryTotals();
        document.getElementById('btn-place-order').disabled = true;
        return;
    }

    subtotalAmount = 0;
    root.innerHTML = cartItems.map(function (item) {
        let price = item.product?.price || 0;
        let lineTotal = price * item.quantity;
        subtotalAmount += lineTotal;
        return `
            <div class="d-flex justify-content-between gap-3 mb-2">
                <div>
                    <div class="fw-semibold" style="font-size:.92rem;">${item.product?.title || 'San pham'}</div>
                    <div class="text-muted" style="font-size:.82rem;">SL: ${item.quantity}</div>
                </div>
                <div class="fw-semibold">${fmt(lineTotal)}</div>
            </div>`;
    }).join('');

    renderSummaryTotals();
    document.getElementById('btn-place-order').disabled = false;
}

async function loadCheckoutData() {
    let token = getToken();
    if (!token) {
        renderLoginState();
        return;
    }

    try {
        let [cartRes, addrRes] = await Promise.all([
            fetch(BASE + '/carts', {
                headers: { Authorization: 'Bearer ' + token }
            }),
            fetch(BASE + '/addresses', {
                headers: { Authorization: 'Bearer ' + token }
            })
        ]);

        let cartRaw = cartRes.ok ? await cartRes.json() : [];
        cartItems = Array.isArray(cartRaw) ? cartRaw : (cartRaw.items || []);
        addresses = addrRes.ok ? await addrRes.json() : [];

        await Promise.all(cartItems.map(async function (item) {
            if (typeof item.product === 'string') {
                let pr = await fetch(BASE + '/products/' + item.product);
                if (pr.ok) {
                    item.product = await pr.json();
                }
            }
        }));

        renderAddresses();
        renderCartSummary();

        let savedCoupon = sessionStorage.getItem('checkout_coupon');
        if (savedCoupon) {
            try {
                let parsed = JSON.parse(savedCoupon);
                if (parsed && parsed.code) {
                    document.getElementById('coupon-input').value = parsed.code;
                    await applyCoupon(parsed.code, true);
                }
            } catch {}
        }
    } catch (err) {
        document.querySelector('.container').innerHTML =
            '<div class="state-card"><div class="icon">!</div><p>Khong the tai du lieu checkout.</p></div>';
    }
}

function getSelectedPaymentMethod() {
    return document.querySelector('input[name="payment-method"]:checked')?.value || 'cod';
}

function getSelectedAddressId() {
    return document.querySelector('input[name="address-id"]:checked')?.value || '';
}

async function applyCoupon(forceCode, silent) {
    let token = getToken();
    let code = (forceCode || document.getElementById('coupon-input').value || '').trim();
    let msg = document.getElementById('coupon-msg');
    document.getElementById('coupon-input').value = code;

    if (!code) {
        appliedCoupon = null;
        sessionStorage.removeItem('checkout_coupon');
        msg.textContent = '';
        renderSummaryTotals();
        return;
    }

    try {
        let response = await fetch(BASE + '/coupons/validate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify({
                code: code,
                orderValue: subtotalAmount
            })
        });

        let data = await response.json();
        if (!response.ok) {
            appliedCoupon = null;
            sessionStorage.removeItem('checkout_coupon');
            msg.innerHTML = `<span class="text-danger">${data.message || 'Ma khong hop le'}</span>`;
            renderSummaryTotals();
            return;
        }

        appliedCoupon = data;
        sessionStorage.setItem('checkout_coupon', JSON.stringify(data));
        msg.innerHTML = `<span class="text-success">Ap dung thanh cong: giam ${fmt(data.discountAmount || 0)}</span>`;
        renderSummaryTotals();
    } catch (err) {
        if (!silent) {
            msg.innerHTML = '<span class="text-danger">Loi ket noi server</span>';
        }
    }
}

async function placeOrder() {
    let token = getToken();
    let manualAddress = document.getElementById('manual-address').value.trim();
    let addressId = getSelectedAddressId();
    let paymentMethod = getSelectedPaymentMethod();
    let errorEl = document.getElementById('checkout-error');

    errorEl.textContent = '';

    if (!cartItems.length) {
        errorEl.textContent = 'Gio hang dang trong.';
        return;
    }

    if (!manualAddress && !addressId) {
        errorEl.textContent = 'Ban can chon dia chi da luu hoac nhap dia chi thu cong.';
        return;
    }

    let body = { paymentMethod: paymentMethod };
    if (manualAddress) {
        body.shippingAddress = manualAddress;
    } else {
        body.addressId = addressId;
    }

    if (appliedCoupon?.code) {
        body.couponCode = appliedCoupon.code;
    }

    let btn = document.getElementById('btn-place-order');
    btn.disabled = true;
    btn.textContent = 'Dang tao don...';

    try {
        let res = await fetch(BASE + '/orders', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify(body)
        });

        let data = await res.json();
        if (!res.ok) {
            errorEl.textContent = data.message || 'Tao don that bai.';
            return;
        }

        sessionStorage.removeItem('checkout_coupon');
        showToast('Dat hang thanh cong', 'success');
        setTimeout(function () {
            window.location.href = '/orders/';
        }, 800);
    } catch (err) {
        errorEl.textContent = 'Loi ket noi server.';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Dat hang ngay';
    }
}

loadCheckoutData();
</script>
</body>
</html>
