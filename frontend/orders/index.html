<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/layout/load-layout.js" defer></script>
</head>
<body>

<div data-include="/layout/header.html"></div>

<div class="container py-4">
    <h4 class="fw-bold mb-4">Lịch sử đơn hàng</h4>
    <div id="orders-content">
        <div class="skeleton-box mb-3" style="height:110px;border-radius:14px;"></div>
        <div class="skeleton-box mb-3" style="height:110px;border-radius:14px;"></div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-msg" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toast-text"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div data-include="/layout/footer.html"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';

const ORDER_STATUS_MAP = {
    pending: { label: 'Chờ xử lý', badge: 'warning text-dark' },
    processing: { label: 'Đang xử lý', badge: 'info text-dark' },
    shipped: { label: 'Đang giao', badge: 'primary' },
    delivered: { label: 'Đã giao', badge: 'success' },
    cancelled: { label: 'Đã hủy', badge: 'secondary' }
};

const PAYMENT_STATUS_MAP = {
    pending: { label: 'Chờ thanh toán', badge: 'warning text-dark' },
    success: { label: 'Thanh toán thành công', badge: 'success' },
    failed: { label: 'Thanh toán thất bại', badge: 'danger' }
};

const METHOD_MAP = {
    cod: 'Thanh toán khi nhận hàng',
    banking: 'Chuyển khoản',
    momo: 'Ví MoMo'
};

function showToast(msg, type) {
    let el = document.getElementById('toast-msg');
    el.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
    document.getElementById('toast-text').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
}

function fmt(n) {
    return Number(n || 0).toLocaleString('vi-VN') + ' đ';
}

function renderBadge(map, value) {
    let item = map[value] || { label: value || 'N/A', badge: 'secondary' };
    return `<span class="badge bg-${item.badge}">${item.label}</span>`;
}

function formatDate(date) {
    if (!date) return '';
    return new Date(date).toLocaleString('vi-VN');
}

function normalizeOrders(transactions) {
    let groups = new Map();

    transactions.forEach(function (tx) {
        let order = tx.orderId || {};
        let orderId = typeof order === 'object' ? order._id : order;
        if (!orderId) return;

        if (!groups.has(orderId)) {
            groups.set(orderId, {
                orderId: orderId,
                order: typeof order === 'object' ? order : null,
                paymentTransaction: null,
                refundTransaction: null
            });
        }

        let current = groups.get(orderId);
        if (!current.order && typeof order === 'object') {
            current.order = order;
        }

        if (tx.type === 'refund') {
            current.refundTransaction = tx;
        } else {
            current.paymentTransaction = tx;
        }
    });

    return Array.from(groups.values()).sort(function (a, b) {
        let dateA = new Date(a.paymentTransaction?.createdAt || a.refundTransaction?.createdAt || 0);
        let dateB = new Date(b.paymentTransaction?.createdAt || b.refundTransaction?.createdAt || 0);
        return dateB - dateA;
    });
}

function renderOrders(orders) {
    let root = document.getElementById('orders-content');

    if (!orders.length) {
        root.innerHTML = `
            <div class="state-card">
                <div class="icon">📦</div>
                <h4>Chưa có đơn hàng nào</h4>
                <p>Bạn chưa phát sinh đơn hàng trong hệ thống.</p>
                <a href="/products/" class="btn btn-primary px-4">Mua sắm ngay</a>
            </div>`;
        return;
    }

    root.innerHTML = orders.map(function (group) {
        let order = group.order || {};
        let paymentTx = group.paymentTransaction;
        let refundTx = group.refundTransaction;
        let orderStatus = order.status || 'pending';
        let paymentStatus = paymentTx?.status || 'pending';
        let canCancel = orderStatus === 'pending' && !refundTx;
        let canRefund = orderStatus === 'processing' && !refundTx;
        let itemCount = Array.isArray(order.items) ? order.items.length : 0;

        return `
            <div class="card border-0 shadow-sm mb-3" style="border-radius:14px;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                        <div>
                            <div class="fw-bold mb-1">Mã đơn: ${group.orderId}</div>
                            <div class="d-flex gap-2 flex-wrap mb-2">
                                ${renderBadge(ORDER_STATUS_MAP, orderStatus)}
                                ${renderBadge(PAYMENT_STATUS_MAP, paymentStatus)}
                                <span class="badge bg-light text-dark border">${METHOD_MAP[paymentTx?.paymentMethod] || paymentTx?.paymentMethod || 'N/A'}</span>
                            </div>
                            <div class="text-muted" style="font-size:.9rem;">
                                ${itemCount} sản phẩm
                                ${order.shippingAddress ? `• ${order.shippingAddress}` : ''}
                            </div>
                            ${refundTx ? `<div class="text-danger mt-2" style="font-size:.88rem;">Đã tạo giao dịch hoàn tiền lúc ${formatDate(refundTx.createdAt)}</div>` : ''}
                        </div>
                        <div class="text-end">
                            <div style="font-size:1.2rem;font-weight:800;color:#e63946;">${fmt(paymentTx?.amount || 0)}</div>
                            <small class="text-muted">${formatDate(paymentTx?.createdAt || refundTx?.createdAt)}</small>
                        </div>
                    </div>

                    ${canCancel ? `
                        <div class="mt-3">
                            <button class="btn btn-sm btn-outline-danger" style="border-radius:8px;"
                                onclick="cancelOrder('${group.orderId}')">
                                Hủy đơn hàng
                            </button>
                        </div>
                    ` : canRefund ? `
                        <div class="mt-3">
                            <button class="btn btn-sm btn-outline-warning" style="border-radius:8px;"
                                onclick="refundOrder('${group.orderId}')">
                                Yêu cầu hoàn tiền
                            </button>
                        </div>
                    ` : ''}
                </div>
            </div>`;
    }).join('');
}

async function loadOrders() {
    let token = localStorage.getItem('token');
    let root = document.getElementById('orders-content');

    if (!token) {
        root.innerHTML = `
            <div class="state-card">
                <div class="icon">🔒</div>
                <h4>Bạn chưa đăng nhập</h4>
                <p>Đăng nhập để xem đơn hàng của mình.</p>
                <a href="/auth/" class="btn btn-primary px-4">Đăng nhập</a>
            </div>`;
        return;
    }

    try {
        let res = await fetch(BASE + '/transactions', {
            headers: { Authorization: 'Bearer ' + token }
        });

        if (!res.ok) {
            root.innerHTML = '<div class="state-card"><div class="icon">⚠️</div><p>Không thể tải đơn hàng.</p></div>';
            return;
        }

        let data = await res.json();
        let list = Array.isArray(data) ? data : [];
        renderOrders(normalizeOrders(list));
    } catch (err) {
        root.innerHTML = '<div class="state-card"><div class="icon">⚠️</div><p>Lỗi kết nối server.</p></div>';
    }
}

async function cancelOrder(orderId) {
    if (!confirm('Bạn có chắc muốn hủy đơn hàng này?')) return;

    let token = localStorage.getItem('token');

    try {
        let res = await fetch(BASE + '/payments/' + orderId + '/cancel', {
            method: 'PUT',
            headers: { Authorization: 'Bearer ' + token }
        });

        let data = await res.json();
        if (!res.ok) {
            showToast(data.message || 'Hủy đơn thất bại', 'danger');
            return;
        }

        showToast('Đã hủy đơn hàng thành công', 'success');
        loadOrders();
    } catch (err) {
        showToast('Lỗi kết nối server', 'danger');
    }
}

async function refundOrder(orderId) {
    if (!confirm('Bạn có chắc muốn yêu cầu hoàn tiền cho đơn hàng này?')) return;

    let token = localStorage.getItem('token');

    try {
        let res = await fetch(BASE + '/transactions/order/' + orderId + '/refund', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token }
        });

        let data = await res.json();
        if (!res.ok) {
            showToast(data.message || 'Yêu cầu hoàn tiền thất bại', 'danger');
            return;
        }

        showToast('Đã tạo yêu cầu hoàn tiền', 'success');
        loadOrders();
    } catch (err) {
        showToast('Lỗi kết nối server', 'danger');
    }
}

loadOrders();
</script>
</body>
</html>
