<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap / Dang ky - ShopVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/layout/styles.css">
</head>
<body class="auth-page">

<div class="auth-logo">
    <a href="/home/">ShopVN</a>
    <p>Mua sam thong minh</p>
</div>

<div class="auth-card">
    <div class="tab-switcher">
        <button class="active" id="btn-tab-login" onclick="switchTab('login')">Dang nhap</button>
        <button id="btn-tab-register" onclick="switchTab('register')">Dang ky</button>
    </div>

    <div class="alert-box" id="alert-box"></div>

    <div class="tab-panel active" id="panel-login">
        <form id="form-login" novalidate>
            <div class="mb-3">
                <label class="form-label">Loai tai khoan</label>
                <select id="login-account-type" class="form-select">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Ten dang nhap</label>
                <input type="text" id="login-username" class="form-control" placeholder="Nhap username" autocomplete="username">
            </div>

            <div class="mb-2">
                <label class="form-label">Mat khau</label>
                <div class="input-group">
                    <button class="input-group-text" id="toggle-login-pw" type="button">Show</button>
                    <input type="password" id="login-password" class="form-control" placeholder="Nhap mat khau" autocomplete="current-password">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <label class="d-flex align-items-center gap-2 mb-0" style="font-size:.85rem; cursor:pointer;">
                    <input type="checkbox" id="remember-me"> Ghi nho dang nhap
                </label>
                <a href="#" style="font-size:.85rem;">Quen mat khau?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-submit" id="btn-login">Dang nhap</button>
        </form>

        <div class="divider">hoac</div>
        <p class="text-center mb-0" style="font-size:.88rem;">
            Chua co tai khoan?
            <a href="#" onclick="switchTab('register'); return false;" class="fw-semibold">Dang ky ngay</a>
        </p>
    </div>

    <div class="tab-panel" id="panel-register">
        <form id="form-register" novalidate>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">Ten dang nhap <span class="text-danger">*</span></label>
                    <input type="text" id="reg-username" class="form-control" placeholder="username" autocomplete="username">
                </div>
                <div class="col-6">
                    <label class="form-label">Ho ten</label>
                    <input type="text" id="reg-fullname" class="form-control" placeholder="Nguyen Van A">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" id="reg-email" class="form-control" placeholder="example@email.com" autocomplete="email">
            </div>

            <div class="mb-3">
                <label class="form-label">Mat khau <span class="text-danger">*</span></label>
                <div class="input-group">
                    <button class="input-group-text" id="toggle-reg-pw" type="button">Show</button>
                    <input type="password" id="reg-password" class="form-control" placeholder="Toi thieu 6 ky tu" autocomplete="new-password">
                </div>
                <div class="pw-bar-wrap"><div class="pw-bar" id="pw-bar"></div></div>
                <div id="pw-hint" style="font-size:.76rem; margin-top:4px; color:#6c757d;"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Loai tai khoan</label>
                <input type="text" class="form-control" value="USER" disabled>
                <div class="form-text mt-1">Dang ky moi tu dong tao tai khoan USER.</div>
            </div>

            <button type="submit" class="btn btn-success btn-submit" id="btn-register">Tao tai khoan</button>
        </form>

        <div class="divider">hoac</div>
        <p class="text-center mb-0" style="font-size:.88rem;">
            Da co tai khoan?
            <a href="#" onclick="switchTab('login'); return false;" class="fw-semibold">Dang nhap</a>
        </p>
    </div>
</div>

<div class="back-home">
    <a href="/home/">&larr; Quay ve trang chu</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE = '/api/v1';

if (localStorage.getItem('token')) {
    if (localStorage.getItem('role') === 'ADMIN') {
        window.location.replace('/admin/');
    } else {
        window.location.replace('/home/');
    }
}

function switchTab(tab) {
    hideAlert();
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('btn-tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('btn-tab-register').classList.toggle('active', tab === 'register');
}

if (window.location.hash === '#register') {
    switchTab('register');
}

function bindToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', function () {
        let inp = document.getElementById(inputId);
        let isPassword = inp.type === 'password';
        inp.type = isPassword ? 'text' : 'password';
        this.textContent = isPassword ? 'Hide' : 'Show';
    });
}

bindToggle('toggle-login-pw', 'login-password');
bindToggle('toggle-reg-pw', 'reg-password');

document.getElementById('reg-password').addEventListener('input', function () {
    let v = this.value;
    let bar = document.getElementById('pw-bar');
    let hint = document.getElementById('pw-hint');
    bar.className = 'pw-bar';
    if (!v) {
        hint.textContent = '';
        return;
    }
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    if (score <= 1) {
        bar.classList.add('weak');
        hint.textContent = 'Yeu';
        hint.style.color = '#dc3545';
    } else if (score <= 2) {
        bar.classList.add('medium');
        hint.textContent = 'Trung binh';
        hint.style.color = '#ffc107';
    } else {
        bar.classList.add('strong');
        hint.textContent = 'Manh';
        hint.style.color = '#198754';
    }
});

function showAlert(msg, type) {
    let el = document.getElementById('alert-box');
    el.textContent = msg;
    el.className = 'alert-box show ' + (type || 'error');
}

function hideAlert() {
    let el = document.getElementById('alert-box');
    el.className = 'alert-box';
}

function setLoading(id, on, label) {
    let btn = document.getElementById(id);
    btn.disabled = on;
    btn.innerHTML = on
        ? '<span class="spinner-border spinner-border-sm me-2"></span>Dang xu ly...'
        : label;
}

async function hydrateLoggedInUser(token, fallbackRole) {
    let redirectUrl = fallbackRole === 'ADMIN' ? '/admin/' : '/home/';
    try {
        let meRes = await fetch(BASE + '/auth/me', {
            headers: { Authorization: 'Bearer ' + token }
        });
        if (meRes.ok) {
            let me = await meRes.json();
            let roleName = me.role && me.role.name ? me.role.name : (fallbackRole || '');
            localStorage.setItem('userId', me._id || '');
            localStorage.setItem('username', me.username || '');
            localStorage.setItem('role', roleName);
            redirectUrl = roleName === 'ADMIN' ? '/admin/' : '/home/';
        } else if (fallbackRole) {
            localStorage.setItem('role', fallbackRole);
        }
    } catch {
        if (fallbackRole) {
            localStorage.setItem('role', fallbackRole);
        }
    }
    return redirectUrl;
}

document.getElementById('form-login').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    let username = document.getElementById('login-username').value.trim();
    let password = document.getElementById('login-password').value;
    let accountType = document.getElementById('login-account-type').value;
    if (!username || !password) {
        showAlert('Vui long dien day du thong tin.');
        return;
    }

    setLoading('btn-login', true, 'Dang nhap');
    try {
        let res = await fetch(BASE + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username,
                password,
                accountType,
                rememberMe: document.getElementById('remember-me').checked
            })
        });
        let data = await res.json();
        if (!res.ok) {
            showAlert(data.message || 'Sai ten dang nhap hoac mat khau.');
            return;
        }

        let token = data.token || data.accessToken || '';
        let roleName = data.role || accountType;
        localStorage.setItem('token', token);
        localStorage.setItem('username', data.username || username);
        localStorage.setItem('userId', data.userId || '');
        localStorage.setItem('role', roleName);

        let redirectUrl = await hydrateLoggedInUser(token, roleName);
        window.location.replace(redirectUrl);
    } catch {
        showAlert('Loi ket noi server. Hay chac chan server dang chay.');
    } finally {
        setLoading('btn-login', false, 'Dang nhap');
    }
});

document.getElementById('form-register').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    let username = document.getElementById('reg-username').value.trim();
    let email = document.getElementById('reg-email').value.trim();
    let fullName = document.getElementById('reg-fullname').value.trim();
    let password = document.getElementById('reg-password').value;
    if (!username || !email || !password) {
        showAlert('Vui long dien day du cac truong bat buoc.');
        return;
    }
    if (password.length < 6) {
        showAlert('Mat khau phai co it nhat 6 ky tu.');
        return;
    }

    setLoading('btn-register', true, 'Tao tai khoan');
    try {
        let res = await fetch(BASE + '/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, fullName, password })
        });
        let data = await res.json();
        if (!res.ok) {
            showAlert(data.message || 'Dang ky that bai.');
            return;
        }

        showAlert('Dang ky thanh cong. Chuyen sang dang nhap...', 'success');
        document.getElementById('form-register').reset();
        document.getElementById('pw-bar').className = 'pw-bar';
        document.getElementById('pw-hint').textContent = '';

        setTimeout(function () {
            switchTab('login');
            document.getElementById('login-username').value = username;
            document.getElementById('login-account-type').value = 'USER';
        }, 900);
    } catch {
        showAlert('Loi ket noi server. Hay chac chan server dang chay.');
    } finally {
        setLoading('btn-register', false, 'Tao tai khoan');
    }
});
</script>
</body>
</html>
